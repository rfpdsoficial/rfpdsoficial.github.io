<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clique Rápido PRO</title>

<style>
:root {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.06);
  --primary: #8b5cf6;
  --secondary: #2563eb;
  --text: #e2e8f0;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #020617, var(--bg));
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* TOPO */
.top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 12px;
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.top-text {
  text-align: center;
  font-size: 0.9rem;
  margin-bottom: 6px;
}

.progress {
  height: 5px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ef4444, #f59e0b, #22c55e);
  transition: width 0.2s;
}

/* CONTAINER */
.container {
  width: 95%;
  max-width: 380px;
  margin-top: 80px;
  background: var(--card);
  border-radius: 20px;
  padding: 25px;
  text-align: center;
  backdrop-filter: blur(15px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

/* HEADER */
h1 {
  font-size: 1.5rem;
  margin-bottom: 10px;
}

#timer {
  font-size: 1.2rem;
  opacity: 0.8;
}

/* BOTÃO */
#clickButton {
  display: none;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: none;
  margin: 20px auto;
  font-size: 1.2rem;
  color: white;
  background: linear-gradient(45deg, var(--secondary), var(--primary));
  box-shadow: 0 0 25px rgba(139,92,246,0.6);
  transition: transform 0.1s;
  animation: pulse 1.5s infinite;
}

#clickButton:active {
  transform: scale(0.9);
}

/* ANIMAÇÃO */
@keyframes pulse {
  0% { box-shadow: 0 0 15px rgba(139,92,246,0.5);}
  50% { box-shadow: 0 0 35px rgba(139,92,246,1);}
  100% { box-shadow: 0 0 15px rgba(139,92,246,0.5);}
}

/* BOTÕES */
button {
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  background: var(--secondary);
}

/* INFO */
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 0.9rem;
  opacity: 0.9;
}

/* RANKING */
.ranking {
  margin-top: 15px;
  text-align: left;
  font-size: 0.85rem;
  opacity: 0.8;
}

/* RESPONSIVO */
@media (max-width: 400px) {
  #clickButton {
    width: 120px;
    height: 120px;
  }
}

@media (min-width: 768px) {
  .container {
    max-width: 420px;
  }
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="top-text" id="topText">Meta: 100 pontos</div>
  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<div class="container">
  <h1>⚡ Clique Rápido</h1>
  <div id="timer">Pressione iniciar</div>

  <button id="startButton">Começar</button>
  <button id="clickButton">CLICA!</button>

  <div class="stats">
    <div>Pontos: <span id="score">0</span></div>
    <div>Recorde: <span id="record">0</span></div>
  </div>

  <button id="restartButton" style="display:none;">Jogar novamente</button>

  <div class="ranking" id="ranking"></div>
</div>

<script>
let timeLeft = 10;
let score = 0;
const goal = 100;
let timer;

const clickButton = document.getElementById('clickButton');
const startButton = document.getElementById('startButton');
const restartButton = document.getElementById('restartButton');
const timerDisplay = document.getElementById('timer');
const scoreDisplay = document.getElementById('score');
const recordDisplay = document.getElementById('record');
const topText = document.getElementById('topText');
const progressBar = document.getElementById('progressBar');
const rankingDiv = document.getElementById('ranking');

let record = localStorage.getItem('record') || 0;
let ranking = JSON.parse(localStorage.getItem('ranking')) || [];

recordDisplay.textContent = record;

function updateProgress() {
  progressBar.style.width = Math.min((score/goal)*100,100) + "%";
}

function updateRanking() {
  rankingDiv.innerHTML = "<b>Top 5</b><br>" +
    ranking.map((s,i)=>`${i+1}. ${s}`).join("<br>");
}

function startGame() {
  timeLeft = 10;
  score = 0;

  scoreDisplay.textContent = score;
  timerDisplay.textContent = `Tempo: ${timeLeft}s`;
  progressBar.style.width = "0%";

  startButton.style.display = 'none';
  restartButton.style.display = 'none';
  clickButton.style.display = 'block';
  clickButton.disabled = false;

  timer = setInterval(() => {
    timeLeft--;
    timerDisplay.textContent = `Tempo: ${timeLeft}s`;

    if (timeLeft <= 3) {
      topText.textContent = "AGORA OU NUNCA";
    } else {
      topText.textContent = "Acelera...";
    }

    if (timeLeft <= 0) {
      clearInterval(timer);
      endGame();
    }
  }, 1000);
}

function endGame() {
  clickButton.disabled = true;
  restartButton.style.display = 'block';

  if (score > record) {
    record = score;
    localStorage.setItem('record', record);
    recordDisplay.textContent = record;
  }

  ranking.push(score);
  ranking.sort((a,b)=>b-a);
  ranking = ranking.slice(0,5);
  localStorage.setItem('ranking', JSON.stringify(ranking));

  updateRanking();
  topText.textContent = score >= goal ? "ELITE" : "Tenta de novo";
}

clickButton.addEventListener('click', () => {
  score++;
  scoreDisplay.textContent = score;
  updateProgress();

  if (score >= 80) {
    topText.textContent = "QUASE LÁ";
  }
});

startButton.addEventListener('click', startGame);
restartButton.addEventListener('click', startGame);

updateRanking();
</script>

</body>
</html>
